<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SLASHR · {{TITLE}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Funnel+Display:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
/* ============================================================
       CSS VARIABLES & RESET
       Variables de couleur, typographie, rayons, gradients.
       Reset global (margin, padding, box-sizing).
       ============================================================ */
    :root {
      --orange: #E74601;
      --orange-light: #FF9011;
      --magenta: #CE08A9;
      --violet: #8962FD;
      --green: #4ade80;
      --bg: #1a1a1a;
      --surface: #2C2E34;
      --surface-alt: #25272E;
      --surface-hover: #3a3d47;
      --text: #ffffff;
      --text-70: rgba(255,255,255,0.7);
      --text-50: rgba(255,255,255,0.5);
      --text-30: rgba(255,255,255,0.3);
      --border: rgba(255,255,255,0.1);
      --border-hover: rgba(255,255,255,0.2);
      --gradient: linear-gradient(90deg, #E74601, #CE08A9, #8962FD);
      --font-display: "Funnel Display", "Sora", "DM Sans", sans-serif;
      --font-body: "Inter", -apple-system, sans-serif;
      --radius: 14px;
      --radius-md: 12px;
      --radius-full: 9999px;
      --text-90: rgba(255,255,255,0.9);
      --magenta-alt: #E61BC9;
      --border-active: rgba(255,255,255,0.3);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; height: 100%; }

    body {
      background: var(--bg);
      color: var(--text-70);
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      height: 100%;
      overflow: hidden;
    }

    /* ============================================================
       LAYOUT — structure de page, navigation, conteneurs
       Nav | Main | Tabs | Slides | Hero | Section | Grids
       ============================================================ */

    /* ============================================================
       NAV — Fixe, blur, onglets dynamiques
       L'agent choisit quels onglets afficher.
       ============================================================ */
    .nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      height: 56px;
      background: rgba(26,26,26,0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }

    .nav-inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 30px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      height: 56px;
    }

    .nav-logo {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.03em;
    }

    .nav-tabs {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .nav-logo span {
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .nav-tab {
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-50);
      cursor: pointer;
      border-radius: var(--radius-full);
      border: none;
      background: none;
      transition: all 0.2s;
      white-space: nowrap;
      font-family: var(--font-body);
    }

    .nav-tab:hover { color: var(--text-70); background: rgba(255,255,255,0.05); }
    .nav-tab.active { color: var(--text); background: var(--surface); }

    .nav-cta {
      justify-self: end;
      padding: 7px 18px;
      font-size: 13px;
      font-weight: 600;
      color: #1a1a1a;
      background: #fff;
      border: none;
      border-radius: var(--radius-full);
      text-decoration: none;
      white-space: nowrap;
      transition: all 0.2s;
      font-family: var(--font-body);
    }
    .nav-cta:hover { background: rgba(255,255,255,0.85); }

    /* ============================================================
       MAIN CONTAINER — Scroll-snap slide system
       Each tab-content is a scroll container.
       Each .slide or .hero is a snap target.
       ============================================================ */
    .main { position: fixed; top: 56px; left: 0; right: 0; bottom: 0; overflow: hidden; background: var(--bg); }

    .tab-content { display: none; height: 100%; overflow-y: auto; scroll-snap-type: y proximity; scroll-behavior: smooth; }
    .tab-content.active { display: block; }

    /* SLIDE — snap target, vertically centered via CSS grid */
    .slide { min-height: calc(100vh - 56px); scroll-snap-align: start; display: grid; align-content: center; padding: clamp(24px,5vh,60px) 30px; max-width: 1280px; margin: 0 auto; box-sizing: border-box; }
    .slide-full { min-height: calc(100vh - 56px); scroll-snap-align: start; display: grid; align-content: center; width: 100%; box-sizing: border-box; }

    /* ============================================================
       HERO — Full-width, blobs gradient, toujours present
       ============================================================ */
    .hero {
      min-height: calc(100vh - 56px);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      position: relative;
      overflow: hidden;
      padding: 30px;
      width: 100%;
      background: var(--bg);
      scroll-snap-align: start;
    }
    .hero { justify-content: center; }

    .hero-short { min-height: calc(100vh - 56px); }

    .hero-blobs {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    /* Blob technique : gradients bicolores, positions bas, GPU-optimized */
    .hero-blobs::before {
      content: '';
      position: absolute;
      width: 50%; height: 50%;
      left: -15%; bottom: -10%;
      background: linear-gradient(239.24deg, #E74601 43.16%, #FF9011 70.85%);
      filter: blur(100px);
      border-radius: 50%;
      transform: translateZ(0);
      backface-visibility: hidden;
    }

    .hero-blobs::after {
      content: '';
      position: absolute;
      width: 70%; height: 45%;
      left: 20%; bottom: 0%;
      background: linear-gradient(239.24deg, #CE08A9 43.16%, #CE16B5 70.85%);
      filter: blur(100px);
      border-radius: 50%;
      transform: translateZ(0);
      backface-visibility: hidden;
    }

    .hero-blob-3 {
      position: absolute;
      width: 50%; height: 55%;
      right: -10%; bottom: -5%;
      background: linear-gradient(180deg, #8962FD 0%, #AD21FE 100%);
      border-radius: 50%;
      filter: blur(175px);
      transform: translateZ(0);
      backface-visibility: hidden;
      z-index: 1;
    }

    .hero > *:not(.hero-blobs):not(.hero-blob-3) { position: relative; z-index: 10; }

    .hero-tag {
      display: inline-block;
      background: var(--surface);
      border: 1px solid var(--border);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-70);
      padding: 6px 18px;
      border-radius: var(--radius-full);
      margin-bottom: 20px;
    }

    .hero h1 {
      font-family: var(--font-display);
      font-size: clamp(44px, 8vw, 80px);
      font-weight: 700;
      color: var(--text);
      line-height: 0.95;
      letter-spacing: -0.04em;
      margin-bottom: 20px;
    }

    .hero-subtitle {
      font-family: var(--font-display);
      font-size: clamp(18px, 3vw, 26px);
      font-weight: 400;
      color: var(--text-50);
      margin-bottom: 10px;
    }

    /* S7 radar : labels visibles hors viewBox */
    .s7-radar-svg { overflow: visible; }

    .hero-date {
      font-size: 14px;
      color: var(--text-30);
      margin-bottom: 0;
    }

    .hero-scroll {
      width: 24px;
      height: 40px;
      border: 2px solid var(--text-30);
      border-radius: 12px;
      position: relative;
      margin-top: 40px;
      cursor: pointer;
    }

    .hero-scroll::after {
      content: '';
      width: 4px; height: 8px;
      background: var(--text-50);
      border-radius: 2px;
      position: absolute;
      top: 6px; left: 50%;
      transform: translateX(-50%);
      animation: scrollBounce 2s infinite;
    }

    @keyframes scrollBounce {
      0%, 100% { opacity: 1; transform: translateX(-50%) translateY(0); }
      50% { opacity: 0.3; transform: translateX(-50%) translateY(12px); }
    }

    /* ============================================================
       SECTION — Label + Titre + Intro
       ============================================================ */
    .section {
      padding: 0;
      border-top: none;
    }

    .section-label {
      display: inline-block;
      background: var(--surface);
      border: 1px solid var(--border);
      font-size: 11.25px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-70);
      padding: 6px 18px;
      border-radius: var(--radius-full);
      margin-bottom: 16px;
    }

    .section h2 {
      font-family: var(--font-display);
      font-size: clamp(28px, 5vw, 45px);
      font-weight: 700;
      color: var(--text);
      line-height: 1.1;
      letter-spacing: -0.04em;
      margin-bottom: 20px;
    }

    .section-intro {
      font-size: 17px;
      color: var(--text-70);
      max-width: 100%;
      margin-bottom: 24px;
      line-height: 1.6;
    }

    /* ============================================================
       GRIDS — 2, 3, 4 colonnes
       ============================================================ */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }


    /* ============================================================
       COMPARER — montrer des ecarts, des contrastes
       VS block | Bar chart | Comparison matrix | Before/After
       ============================================================ */

    /* ============================================================
       VS BLOCK — Face-a-face 2 entites
       Usage : prospect vs concurrent principal
       ============================================================ */
    .vs-grid { display: grid; grid-template-columns: 1fr auto 1fr; gap: 0; margin-bottom: 24px; align-items: stretch; }
    .vs-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 28px; text-align: center;
    }
    .vs-card h3 { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 16px; }
    .vs-separator {
      display: flex; align-items: center; justify-content: center;
      padding: 0 16px; font-family: var(--font-display);
      font-size: 20px; font-weight: 700; color: var(--text-30);
    }
    .vs-metric { margin-bottom: 16px; }
    .vs-metric-value {
      font-family: var(--font-display); font-size: 28px; font-weight: 700;
      color: var(--text); line-height: 1;
    }
    .vs-metric-value.bad { color: var(--text-50); }
    .vs-metric-value.good { color: var(--green); }
    .vs-metric-label { font-size: 11px; color: var(--text-50); text-transform: uppercase; letter-spacing: 0.06em; }

    /* ============================================================
       BAR CHART — Benchmark concurrentiel anime
       Usage : comparaison trafic prospect vs concurrents
       ============================================================ */
    .chart-container { margin-bottom: 50px; }

    .chart-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-50);
      margin-bottom: 20px;
    }

    .bar-row {
      display: grid;
      grid-template-columns: 130px 1fr 110px;
      align-items: center;
      gap: 16px;
      margin-bottom: 12px;
    }

    .bar-label { font-size: 14px; font-weight: 600; color: var(--text-70); text-align: right; }
    .bar-label.is-prospect { color: var(--text); }

    .bar-track { height: 32px; background: var(--surface); border-radius: 8px; overflow: hidden; }

    .bar-fill {
      height: 100%;
      border-radius: 8px;
      transition: width 1s cubic-bezier(0.22, 1, 0.36, 1);
      width: 0;
    }

    .bar-fill.orange { background: var(--orange); }
    .bar-fill.violet { background: var(--violet); }
    .bar-fill.muted { background: var(--text-30); }

    .bar-value { font-size: 14px; font-weight: 700; color: var(--text-70); text-align: right; }
    .bar-value.is-prospect { color: var(--orange); }

    /* ============================================================
       COMPARISON MATRIX — [NEW] Tableau comparatif multi-criteres
       Usage : comparer 3+ options (SLASHR vs agence vs freelance,
               ou SEO vs SEA vs Social)
       ============================================================ */
    .matrix-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 24px;
    }

    .matrix-wrap table { width: 100%; border-collapse: collapse; }

    .matrix-wrap th {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-50);
      background: var(--surface-alt);
      padding: 14px 16px;
      text-align: center;
    }

    .matrix-wrap th:first-child { text-align: left; }

    .matrix-wrap th.recommended {
      color: var(--orange);
      position: relative;
    }

    .matrix-wrap td {
      font-size: 14px;
      color: var(--text-70);
      padding: 14px 16px;
      border-top: 1px solid var(--border);
      text-align: center;
    }

    .matrix-wrap td:first-child {
      text-align: left;
      font-weight: 600;
      color: var(--text);
    }

    .matrix-wrap td.recommended-col {
      background: rgba(231,70,1,0.04);
    }

    .matrix-check { color: var(--green); font-weight: 700; font-size: 16px; }
    .matrix-cross { color: var(--text-30); font-size: 16px; }
    .matrix-partial { color: var(--orange-light); font-size: 16px; }

    /* ============================================================
       BEFORE/AFTER — [NEW] Transformation en 2 panneaux
       Usage : montrer l'etat actuel vs l'objectif apres intervention
       ============================================================ */
    .before-after {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 0;
      margin-bottom: 24px;
      align-items: stretch;
    }

    .ba-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 28px;
    }

    .ba-panel.before { }
    .ba-panel.after {
      border-color: rgba(231,70,1,0.3);
    }

    .ba-tag {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 4px 14px;
      border-radius: var(--radius-full);
      margin-bottom: 20px;
    }

    .ba-panel.before .ba-tag {
      background: rgba(255,255,255,0.05);
      color: var(--text-50);
    }

    .ba-panel.after .ba-tag {
      background: rgba(231,70,1,0.15);
      color: var(--orange);
    }

    .ba-panel h3 { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 12px; }
    .ba-panel p { font-size: 14px; color: var(--text-70); line-height: 1.5; }
    .ba-panel ul { list-style: none; margin-top: 12px; }
    .ba-panel ul li {
      font-size: 13px; color: var(--text-70); padding: 4px 0 4px 18px; position: relative;
    }
    .ba-panel ul li::before {
      content: ''; position: absolute; left: 0; top: 11px;
      width: 6px; height: 6px; border-radius: 50%;
    }
    .ba-panel.before ul li::before { background: var(--text-30); }
    .ba-panel.after ul li::before { background: var(--orange); }

    .ba-arrow {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 20px;
      font-size: 28px;
      color: var(--orange);
    }


    /* ============================================================
       QUANTIFIER — chiffres, metriques, scores, couts
       KPI card | KPI large | Slide constat | KPI mini | Stat row
       Cost card | Progress bar | Donut chart | Number ticker
       ============================================================ */

    /* ============================================================
       KPI CARD — Standard
       Usage : metriques cles en grille (2/3/4 colonnes)
       ============================================================ */
    .kpi {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 24px;
      text-align: center;
      transition: border-color 0.3s, transform 0.3s;
    }

    .kpi:hover { border-color: var(--border-hover); transform: scale(1.02); }

    .kpi-value {
      font-family: var(--font-display);
      font-size: 40px;
      font-weight: 700;
      color: var(--orange);
      line-height: 1;
      margin-bottom: 6px;
    }

    .kpi-value.magenta { color: var(--magenta); }
    .kpi-value.violet { color: var(--violet); }
    .kpi-value.green { color: var(--green); }

    .kpi-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-50);
    }

    .kpi-sub { font-size: 12px; color: var(--text-30); margin-top: 4px; }

    /* ============================================================
       KPI LARGE — Floating hero-style, glow derriere le chiffre
       Usage : un seul chiffre statement (ex: < 1% de visibilite)
       Pas de box/border. Le chiffre flotte avec un glow subtil.
       ============================================================ */
    .kpi-large {
      text-align: center;
      position: relative;
      padding: 0;
    }

    .kpi-large::before {
      content: '';
      position: absolute;
      width: 400px;
      height: 300px;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: radial-gradient(ellipse, rgba(206,8,169,0.10) 0%, rgba(137,98,253,0.05) 50%, transparent 70%);
      filter: blur(70px);
      pointer-events: none;
      z-index: 0;
    }

    .kpi-large > * {
      position: relative;
      z-index: 1;
    }

    .kpi-large .kpi-value {
      font-family: var(--font-display);
      font-size: clamp(72px, 12vw, 130px);
      font-weight: 700;
      color: var(--orange);
      background: linear-gradient(135deg, var(--orange) 0%, var(--magenta) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 12px;
      letter-spacing: -0.04em;
      display: inline-block;
      padding-bottom: 0.05em;
    }

    .kpi-large .kpi-label {
      font-size: clamp(16px, 2vw, 20px);
      font-weight: 400;
      color: var(--text-70);
      text-transform: none;
      letter-spacing: 0;
      max-width: 520px;
      margin: 0 auto;
      line-height: 1.4;
    }

    .kpi-large .kpi-sub {
      font-size: 14px;
      color: var(--text-50);
      margin-top: 8px;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }

    /* ============================================================
       SLIDE CONSTAT — Slide statement avec KPI large + data row
       Usage : "Votre marque est connue. Mais votre site est invisible."
       Composants : constat-title, kpi-large, constat-data, constat-source
       ============================================================ */
    .slide-constat {
      align-items: center;
      text-align: center;
    }

    .constat-title {
      font-family: var(--font-display);
      font-size: clamp(22px, 3.5vw, 32px);
      font-weight: 500;
      color: var(--text-70);
      line-height: 1.3;
      letter-spacing: -0.02em;
      margin-bottom: 16px;
      max-width: 600px;
    }

    .constat-data {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      margin-top: 24px;
      flex-wrap: wrap;
    }

    .constat-data-item {
      font-size: 14px;
      color: var(--text-50);
      letter-spacing: 0;
    }

    .constat-data-item strong {
      color: var(--text);
      font-weight: 600;
    }

    .constat-data-sep {
      width: 1px;
      height: 16px;
      background: var(--border);
      flex-shrink: 0;
    }

    .constat-source {
      font-size: 11px;
      color: var(--text-30);
      margin-top: 16px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      font-weight: 500;
    }

    /* ============================================================
       KPI MINI — [NEW] Compact inline (icone + chiffre + texte)
       Usage : lister 6-8 metriques sans prendre trop de place
       ============================================================ */
    .kpi-mini-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .kpi-mini {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      transition: border-color 0.2s;
    }

    .kpi-mini:hover { border-color: var(--border-hover); }

    .kpi-mini-icon {
      flex-shrink: 0;
      width: 36px; height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      background: rgba(231,70,1,0.1);
    }

    .kpi-mini-icon.magenta { background: rgba(206,8,169,0.1); }
    .kpi-mini-icon.violet { background: rgba(137,98,253,0.1); }

    .kpi-mini-data { flex: 1; }

    .kpi-mini-value {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
    }

    .kpi-mini-label {
      font-size: 11px;
      color: var(--text-50);
      margin-top: 2px;
    }

    /* ============================================================
       STAT ROW — [NEW] Rangee horizontale de stats legeres
       Usage : metriques secondaires, apercu rapide sans cards
       ============================================================ */
    .stat-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 32px;
      margin-bottom: 24px;
    }

    .stat-row-item {
      text-align: center;
      flex: 1;
      position: relative;
    }

    .stat-row-item + .stat-row-item::before {
      content: '';
      position: absolute;
      left: 0; top: 10%; bottom: 10%;
      width: 1px;
      background: var(--border);
    }

    .stat-row-value {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
      margin-bottom: 4px;
    }

    .stat-row-value.orange { color: var(--orange); }
    .stat-row-value.magenta { color: var(--magenta); }
    .stat-row-value.violet { color: var(--violet); }
    .stat-row-value.green { color: var(--green); }

    .stat-row-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-50);
    }

    /* ============================================================
       COST CARD — Chiffre d'impact (cout de l'inaction)
       ============================================================ */
    .cost-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 28px;
      text-align: center;
      transition: border-color 0.2s;
    }

    .cost-card:hover { border-color: var(--border-hover); }

    .cost-value {
      font-family: var(--font-display);
      font-size: 42px;
      font-weight: 700;
      color: var(--orange);
      line-height: 1;
      margin-bottom: 4px;
    }

    .cost-label {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-50);
      margin-bottom: 12px;
    }

    .cost-desc { font-size: 13px; color: var(--text-70); line-height: 1.5; }

    /* ============================================================
       PROGRESS BAR — [NEW] Barre de progression / gauge
       Usage : score technique, maturite, % du gap comble
       ============================================================ */
    .progress-group { margin-bottom: 24px; }

    .progress-item {
      margin-bottom: 20px;
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 8px;
    }

    .progress-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    .progress-value {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 700;
      color: var(--orange);
    }

    .progress-track {
      height: 10px;
      background: var(--surface);
      border-radius: 5px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 5px;
      background: var(--gradient);
      transition: width 1.2s cubic-bezier(0.22, 1, 0.36, 1);
      width: 0;
    }

    .progress-fill.orange { background: var(--orange); }
    .progress-fill.magenta { background: var(--magenta); }
    .progress-fill.violet { background: var(--violet); }
    .progress-fill.green { background: var(--green); }

    .progress-sub {
      font-size: 12px;
      color: var(--text-30);
      margin-top: 4px;
    }

    /* ============================================================
       DONUT CHART — [NEW] Repartition en % (SVG anime)
       Usage : part marque vs hors-marque, repartition trafic
       ============================================================ */
    .donut-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 24px;
      margin-bottom: 24px;
    }

    .donut-item { text-align: center; }

    .donut-svg {
      width: 140px;
      height: 140px;
      margin: 0 auto 16px;
      transform: rotate(-90deg);
    }

    .donut-track {
      fill: none;
      stroke: var(--surface);
      stroke-width: 10;
    }

    .donut-fill {
      fill: none;
      stroke: var(--orange);
      stroke-width: 10;
      stroke-linecap: round;
      transition: stroke-dashoffset 1.5s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .donut-fill.orange { stroke: var(--orange); }
    .donut-fill.magenta { stroke: var(--magenta); }
    .donut-fill.violet { stroke: var(--violet); }
    .donut-fill.green { stroke: var(--green); }

    .donut-center {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
      margin-bottom: 4px;
    }

    .donut-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-50);
    }

    /* ============================================================
       NUMBER TICKER — [NEW] Compteur anime au scroll
       Usage : dramatiser un chiffre cle a l'apparition
       Le JS anime de 0 au nombre cible.
       ============================================================ */
    .ticker-row {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 8px;
      margin-bottom: 24px;
    }

    .ticker-value {
      font-family: var(--font-display);
      font-size: clamp(48px, 8vw, 80px);
      font-weight: 700;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }

    .ticker-suffix {
      font-family: var(--font-display);
      font-size: clamp(24px, 4vw, 40px);
      font-weight: 600;
      color: var(--text-50);
    }


    /* ============================================================
       CITER — voix du prospect, social proof, citations
       Verbatim box | Pull quote | Testimonial card
       ============================================================ */

    /* ============================================================
       VERBATIM BOX — Citation prospect (bordure magenta)
       ============================================================ */
    .verbatim-box {
      background: var(--surface);
      border-left: 3px solid var(--magenta);
      border-radius: 0 var(--radius) var(--radius) 0;
      padding: 18px 24px;
      margin-bottom: 24px;
      font-size: 16px;
      line-height: 1.6;
      font-style: italic;
      color: var(--text);
    }

    .verbatim-box .source {
      display: block;
      font-style: normal;
      font-size: 12px;
      color: var(--text-50);
      margin-top: 8px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* ============================================================
       PULL QUOTE — [NEW] Grande citation centree, rupture de rythme
       Usage : phrase strategique forte qui merite d'etre lue seule
       ============================================================ */
    .pull-quote {
      text-align: center;
      padding: 60px 40px;
      margin-bottom: 24px;
      position: relative;
    }

    .pull-quote::before {
      content: '"';
      font-family: var(--font-display);
      font-size: 120px;
      font-weight: 700;
      color: var(--orange);
      opacity: 0.15;
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      line-height: 1;
    }

    .pull-quote p {
      font-family: var(--font-display);
      font-size: clamp(22px, 4vw, 32px);
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
      letter-spacing: -0.02em;
      max-width: 700px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    .pull-quote .pull-source {
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 600;
      color: var(--text-50);
      margin-top: 20px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      position: relative;
      z-index: 1;
    }

    /* ============================================================
       TESTIMONIAL CARD — [NEW] Photo + citation + nom/role
       Usage : social proof, cas client, reference
       ============================================================ */
    .testimonial-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .testimonial {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      transition: border-color 0.3s, transform 0.3s;
    }

    .testimonial:hover { border-color: var(--border-hover); transform: scale(1.02); }

    .testimonial-text {
      font-size: 15px;
      color: var(--text-70);
      line-height: 1.6;
      font-style: italic;
      margin-bottom: 20px;
    }

    .testimonial-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .testimonial-avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--surface-hover);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .testimonial-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
    }

    .testimonial-role {
      font-size: 12px;
      color: var(--text-50);
    }


    /* ============================================================
       STRUCTURER — organiser, sequencer, hierarchiser
       Timeline | Routine grid | Funnel | Accordion
       ============================================================ */

    /* ============================================================
       TIMELINE — Phases orange/magenta/violet
       ============================================================ */
    .timeline {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 50px;
    }

    .phase {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
    }

    .phase-tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 4px 14px;
      border-radius: var(--radius-full);
      margin-bottom: 16px;
    }

    .phase-1 .phase-tag { background: rgba(231,70,1,0.15); color: var(--orange); }
    .phase-2 .phase-tag { background: rgba(206,8,169,0.15); color: var(--magenta); }
    .phase-3 .phase-tag { background: rgba(137,98,253,0.15); color: var(--violet); }

    .phase h3 { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 10px; }
    .phase p { font-size: 14px; color: var(--text-70); line-height: 1.5; }

    .phase ul { list-style: none; margin-top: 14px; }

    .phase ul li {
      font-size: 13px;
      color: var(--text-70);
      padding: 5px 0 5px 18px;
      position: relative;
    }

    .phase ul li::before {
      content: '';
      position: absolute;
      left: 0; top: 12px;
      width: 6px; height: 6px;
      border-radius: 50%;
    }

    .phase-1 ul li::before { background: var(--orange); }
    .phase-2 ul li::before { background: var(--magenta); }
    .phase-3 ul li::before { background: var(--violet); }

    /* ============================================================
       ROUTINE GRID — Process en etapes numerotees
       ============================================================ */
    .routine-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 2px;
      margin-bottom: 24px;
    }

    .routine-step {
      background: var(--surface);
      padding: 24px 20px;
      text-align: center;
      position: relative;
    }

    .routine-step:first-child { border-radius: var(--radius) 0 0 var(--radius); }
    .routine-step:last-child { border-radius: 0 var(--radius) var(--radius) 0; }

    .routine-num {
      font-family: var(--font-display);
      font-size: 32px;
      font-weight: 700;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 8px;
    }

    .routine-title { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
    .routine-desc { font-size: 12px; color: var(--text-50); }

    /* ============================================================
       FUNNEL — [NEW] Etapes connectees par des fleches
       Usage : parcours utilisateur, pipeline de conversion
       ============================================================ */
    .funnel {
      display: flex;
      align-items: stretch;
      gap: 0;
      margin-bottom: 24px;
    }

    .funnel-step {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 24px 20px;
      text-align: center;
      position: relative;
    }

    .funnel-step:first-child { border-radius: var(--radius) 0 0 var(--radius); }
    .funnel-step:last-child { border-radius: 0 var(--radius) var(--radius) 0; }

    .funnel-step + .funnel-step { border-left: none; }

    .funnel-arrow {
      flex-shrink: 0;
      width: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--orange);
      font-size: 18px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }

    .funnel-icon {
      font-size: 24px;
      margin-bottom: 8px;
    }

    .funnel-value {
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
      margin-bottom: 4px;
    }

    .funnel-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-50);
    }

    .funnel-sub {
      font-size: 12px;
      color: var(--text-30);
      margin-top: 4px;
    }

    /* ============================================================
       ACCORDION — [NEW] Details cachees sous un resume cliquable
       Usage : FAQ, details methodologiques, scope detaille
       ============================================================ */
    .accordion { margin-bottom: 24px; }

    .accordion-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 8px;
      overflow: hidden;
    }

    .accordion-trigger {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 20px 24px;
      background: none;
      border: none;
      cursor: pointer;
      font-family: var(--font-body);
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      text-align: left;
      transition: color 0.2s;
    }

    .accordion-trigger:hover { color: var(--orange); }

    .accordion-icon {
      font-size: 18px;
      color: var(--text-50);
      transition: transform 0.3s;
      flex-shrink: 0;
      margin-left: 16px;
    }

    .accordion-item.open .accordion-icon {
      transform: rotate(45deg);
      color: var(--orange);
    }

    .accordion-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .accordion-item.open .accordion-content {
      max-height: 500px;
    }

    .accordion-body {
      padding: 0 24px 20px;
      font-size: 14px;
      color: var(--text-70);
      line-height: 1.6;
    }


    /* ============================================================
       ALERTER — attirer l'attention, conclure, recommander
       Highlight box (4 variantes) | Callout banner
       ============================================================ */

    /* ============================================================
       HIGHLIGHT BOX — Encadre avec bordure coloree
       Variantes : (default) orange, .highlight-magenta,
                   .highlight-violet, .highlight-gradient
       ============================================================ */
    .highlight-box {
      background: var(--surface);
      border-left: 3px solid var(--orange);
      border-radius: 0 var(--radius) var(--radius) 0;
      padding: 18px 24px;
      margin-bottom: 24px;
      font-size: 15px;
      line-height: 1.6;
    }

    .highlight-box strong { color: var(--text); }

    .highlight-box.highlight-magenta { border-left-color: var(--magenta); }
    .highlight-box.highlight-violet { border-left-color: var(--violet); }
    .highlight-box.highlight-gradient {
      border-left: none;
      border-image: var(--gradient) 1;
      border-left-width: 3px;
      border-left-style: solid;
    }

    /* ============================================================
       CALLOUT BANNER — [NEW] Bandeau full-width avec fond gradient
       Usage : conclusion forte, recommandation finale, rupture
       ============================================================ */
    .callout-banner {
      margin-left: calc(-50vw + 50%);
      margin-right: calc(-50vw + 50%);
      width: 100vw;
      padding: 48px 30px;
      text-align: center;
      position: relative;
      overflow: hidden;
      margin-bottom: 24px;
    }

    .callout-banner::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--gradient);
      opacity: 0.08;
    }

    .callout-banner > * { position: relative; z-index: 1; }

    .callout-banner h3 {
      font-family: var(--font-display);
      font-size: clamp(20px, 3vw, 28px);
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }

    .callout-banner p {
      font-size: 15px;
      color: var(--text-70);
      max-width: 600px;
      margin: 0 auto;
      line-height: 1.6;
    }


    /* ============================================================
       VENDRE — conversion, investissement, ROI
       Pricing card | ROI Simulator | CTA full-width
       ============================================================ */

    /* ============================================================
       PRICING CARD — Nom + Prix + Scope
       Ajouter .recommended pour le scenario recommande
       ============================================================ */
    .pricing-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 50px; }

    .pricing {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 28px;
      text-align: center;
      transition: border-color 0.3s, transform 0.3s;
    }

    .pricing:hover { transform: scale(1.02); }

    .pricing.recommended {
      border: 2px solid transparent;
      background-image: linear-gradient(var(--surface), var(--surface)), var(--gradient);
      background-origin: border-box;
      background-clip: padding-box, border-box;
      position: relative;
    }

    .pricing.recommended::before {
      content: 'Recommandé';
      position: absolute;
      top: -12px; left: 50%;
      transform: translateX(-50%);
      background: var(--gradient);
      color: white;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 4px 16px;
      border-radius: var(--radius-full);
    }

    .pricing-name { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    .pricing-price { font-family: var(--font-display); font-size: 36px; font-weight: 700; color: var(--text); margin: 16px 0 4px; }
    .pricing-period { font-size: 13px; color: var(--text-50); margin-bottom: 16px; }
    .pricing-scope { font-size: 13px; color: var(--text-70); line-height: 1.5; text-align: left; }
    .pricing-scope ul { list-style: none; margin-top: 8px; }
    .pricing-scope ul li { padding: 3px 0 3px 16px; position: relative; font-size: 13px; color: var(--text-70); }
    .pricing-scope ul li::before { content: '→'; position: absolute; left: 0; color: var(--text-50); }

    /* ============================================================
       ROI SIMULATOR — Sliders interactifs + calcul JS
       ============================================================ */
    .sim-row {
      display: grid;
      grid-template-columns: 240px 1fr 120px;
      align-items: center;
      gap: 20px;
      margin-bottom: 24px;
    }

    .sim-label { font-size: 14px; font-weight: 600; color: var(--text-70); }
    .sim-sub { font-size: 11px; color: var(--text-30); margin-top: 2px; }

    .sim-slider {
      -webkit-appearance: none;
      width: 100%;
      height: 6px;
      background: var(--surface);
      border-radius: 3px;
      outline: none;
    }

    .sim-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px; height: 20px;
      border-radius: 50%;
      background: var(--orange);
      cursor: pointer;
      border: 3px solid var(--bg);
      box-shadow: 0 0 0 2px var(--orange);
    }
    .sim-slider::-moz-range-thumb {
      width: 20px; height: 20px;
      border-radius: 50%;
      background: var(--orange);
      cursor: pointer;
      border: 3px solid var(--bg);
      box-shadow: 0 0 0 2px var(--orange);
    }
    .sim-slider::-moz-range-track {
      height: 6px;
      background: var(--surface);
      border-radius: 3px;
      border: none;
    }

    .sim-value {
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      text-align: right;
    }

    .sim-results {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-top: 50px;
      margin-bottom: 24px;
    }

    .sim-result {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      text-align: center;
    }

    .sim-result-value {
      font-family: var(--font-display);
      font-size: 36px;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 6px;
    }

    .sim-result-value.orange { color: var(--orange); }
    .sim-result-value.magenta { color: var(--magenta); }
    .sim-result-value.violet { color: var(--violet); }

    .sim-result-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-50);
    }

    /* ============================================================
       CTA — Full-width avec blobs
       ============================================================ */
    .cta-section {
      text-align: center;
      padding: 100px 30px;
      position: relative;
      overflow: hidden;
      clip-path: inset(0);
      width: 100%;
      min-height: calc(100vh - 56px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      scroll-snap-align: start;
      background: var(--bg);
    }

    .cta-section .hero-blobs { opacity: 0.5; }

    .cta-section h2 {
      font-family: var(--font-display);
      font-size: clamp(28px, 5vw, 44px);
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.03em;
      margin-bottom: 16px;
      position: relative;
      z-index: 1;
    }

    .cta-section p {
      color: var(--text-70);
      max-width: 500px;
      margin: 0 auto 40px;
      position: relative;
      z-index: 1;
    }

    .cta-wrap {
      display: inline-block;
      background: transparent;
      border-radius: var(--radius-full);
      padding: 2px;
      position: relative;
      z-index: 1;
      transition: background 0.3s;
    }
    .cta-wrap:hover { background: var(--gradient); }

    .cta-btn {
      display: inline-block;
      background: #ffffff;
      color: var(--bg);
      font-family: var(--font-body);
      font-size: 15px;
      font-weight: 600;
      padding: 14px 40px;
      border-radius: var(--radius-full);
      text-decoration: none;
      transition: background 0.3s, color 0.3s;
    }
    .cta-wrap:hover .cta-btn { background: #ffffff; color: var(--bg); }


    /* ============================================================
       CONTEXTUALISER — situation, donnees, details
       Context card | Card (standard, accent, icon) | Quick win
       Table | Tags
       ============================================================ */

    /* ============================================================
       CONTEXT CARD — Icone + Titre + Description
       ============================================================ */
    .context-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 20px;
    }

    .context-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      display: flex;
      gap: 20px;
      align-items: flex-start;
      transition: border-color 0.2s;
    }

    .context-card:hover { border-color: var(--border-hover); }

    .context-icon {
      flex-shrink: 0;
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: rgba(231,70,1,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    .context-body h3 { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    .context-body p { font-size: 14px; color: var(--text-70); line-height: 1.55; }
    .context-body strong { color: var(--text); }

    /* ============================================================
       CARD — Generique + variantes
       .card         — standard (titre + paragraphe)
       .card-accent  — [NEW] bordure top gradient
       .card-icon    — [NEW] icone ronde en en-tete
       ============================================================ */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      transition: border-color 0.3s, transform 0.3s;
    }

    .card:hover { border-color: var(--border-hover); transform: scale(1.02); }
    .card h3 { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
    .card p { font-size: 14px; color: var(--text-70); line-height: 1.5; }

    /* Card accent — bordure top gradient */
    .card-accent {
      border-top: 3px solid transparent;
      border-image: var(--gradient) 1;
      border-image-slice: 1 1 0 1;
    }

    /* Card icon — icone ronde en haut */
    .card-icon .card-icon-circle {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      margin-bottom: 16px;
    }

    .card-icon .card-icon-circle.orange { background: rgba(231,70,1,0.15); }
    .card-icon .card-icon-circle.magenta { background: rgba(206,8,169,0.15); }
    .card-icon .card-icon-circle.violet { background: rgba(137,98,253,0.15); }

    /* ============================================================
       QUICK WIN CARD — Icone + Titre + Description + Impact
       ============================================================ */
    .qw-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 50px; }

    .qw {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
    }

    .qw-icon {
      width: 44px; height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      margin-bottom: 16px;
    }

    .qw-icon.orange { background: rgba(231,70,1,0.15); color: var(--orange); }
    .qw-icon.magenta { background: rgba(206,8,169,0.15); color: var(--magenta); }
    .qw-icon.violet { background: rgba(137,98,253,0.15); color: var(--violet); }

    .qw h3 { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
    .qw p { font-size: 13px; color: var(--text-70); line-height: 1.5; }
    .qw .qw-impact { font-size: 12px; font-weight: 600; color: var(--orange); margin-top: 10px; }

    /* ============================================================
       TABLE — Donnees structurees
       ============================================================ */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 24px;
    }

    table { width: 100%; border-collapse: collapse; }

    th {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-50);
      background: var(--surface-alt);
      padding: 12px 16px;
      text-align: left;
    }

    td {
      font-size: 14px;
      color: var(--text-70);
      padding: 12px 16px;
      border-top: 1px solid var(--border);
    }

    tr.prospect td { color: var(--text); font-weight: 600; background: rgba(231,70,1,0.04); }
    td.highlight { color: var(--orange); font-weight: 700; }
    td.pos-good { color: #4ade80; font-weight: 600; }
    td.pos-mid { color: var(--orange-light); font-weight: 600; }
    td.pos-bad { color: var(--text-50); }

    .tag-brand {
      display: inline-block;
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      background: rgba(206,8,169,0.15); color: var(--magenta);
      padding: 2px 8px; border-radius: var(--radius-full);
    }

    .tag-generic {
      display: inline-block;
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      background: rgba(137,98,253,0.15); color: var(--violet);
      padding: 2px 8px; border-radius: var(--radius-full);
    }

    .query-pill {
      display: inline-block;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-full);
      padding: 5px 14px;
      font-size: 12px;
      color: var(--text-50);
    }


    /* ============================================================
       DIAGNOSTIQUER — S7 Search System, scoring, priorisation
       S7 Overview Grid | S7 Insight Callout | S7 Priority Table
       ============================================================ */

    /* --- S7 Overview Grid : 7 force cards + score + state --- */
    .s7-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin: 32px 0;
    }
    .s7-grid > :nth-child(n+5) { /* rangee du bas : 3 cartes centrees */ }

    .s7-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 24px 20px;
      position: relative;
      transition: border-color 0.3s, transform 0.3s;
    }
    .s7-card:hover { border-color: var(--border-hover); transform: scale(1.02); }
    .s7-card[data-state="primary"] { border-color: var(--orange); }
    .s7-card[data-state="secondary"] { border-color: var(--magenta); }
    .s7-card[data-state="deferred"] { border-color: var(--border); opacity: 0.6; }

    .s7-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .s7-card-id {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-50);
    }
    .s7-card[data-state="primary"] .s7-card-id { color: var(--orange); }
    .s7-card[data-state="secondary"] .s7-card-id { color: var(--magenta); }

    .s7-badge {
      display: inline-block;
      font-size: 9px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 3px 10px;
      border-radius: var(--radius-full);
    }
    .s7-badge-primary {
      background: rgba(231,70,1,0.15); color: var(--orange);
    }
    .s7-badge-secondary {
      background: rgba(206,8,169,0.15); color: var(--magenta);
    }
    .s7-badge-deferred {
      background: rgba(255,255,255,0.06); color: var(--text-50);
    }

    .s7-card-title {
      font-family: var(--font-body);
      font-size: 15px; font-weight: 600;
      color: var(--text-90);
      margin-bottom: 16px;
      line-height: 1.3;
    }

    .s7-score {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .s7-score-bar {
      flex: 1;
      height: 6px;
      background: rgba(255,255,255,0.08);
      border-radius: 3px;
      overflow: hidden;
    }

    .s7-score-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.6s ease;
    }
    .s7-card[data-state="primary"] .s7-score-fill {
      background: linear-gradient(90deg, var(--orange), var(--orange-light));
    }
    .s7-card[data-state="secondary"] .s7-score-fill {
      background: linear-gradient(90deg, var(--magenta), var(--magenta-alt));
    }
    .s7-card[data-state="deferred"] .s7-score-fill {
      background: rgba(255,255,255,0.2);
    }

    .s7-score-value {
      font-size: 13px; font-weight: 700;
      color: var(--text-70);
      min-width: 28px;
      text-align: right;
    }

    .s7-card-diagnostic {
      margin-top: 12px;
      font-size: 13px;
      color: var(--text-50);
      line-height: 1.45;
    }


    /* --- S7 Insight Callout : contrainte principale --- */
    .s7-insight {
      background: linear-gradient(135deg, rgba(231,70,1,0.08), rgba(206,8,169,0.06));
      border: 1px solid rgba(231,70,1,0.25);
      border-left: 4px solid var(--orange);
      border-radius: var(--radius-md);
      padding: 28px 32px;
      margin: 32px 0;
    }

    .s7-insight-label {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--orange);
      margin-bottom: 8px;
    }

    .s7-insight-constraint {
      font-family: var(--font-display);
      font-size: clamp(18px, 3vw, 24px);
      font-weight: 600;
      color: #ffffff;
      line-height: 1.25;
      margin-bottom: 16px;
    }

    .s7-insight-why {
      font-size: 14px;
      color: var(--text-70);
      line-height: 1.55;
    }
    .s7-insight-why strong {
      color: var(--text-90);
    }


    /* --- S7 Prioritization Table : Force / Diagnostic / Action / Horizon --- */
    .s7-priority-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      margin: 32px 0;
    }

    .s7-priority-table thead th {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-50);
      padding: 12px 16px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    .s7-priority-table thead th:first-child { border-radius: 8px 0 0 0; }
    .s7-priority-table thead th:last-child { border-radius: 0 8px 0 0; }

    .s7-priority-table tbody td {
      font-size: 14px;
      color: var(--text-70);
      padding: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      vertical-align: top;
    }
    .s7-priority-table tbody tr:last-child td { border-bottom: none; }

    .s7-priority-table tbody td:first-child {
      font-weight: 600;
      color: var(--text-90);
      white-space: nowrap;
    }

    .s7-priority-table .s7-horizon {
      display: inline-block;
      font-size: 11px; font-weight: 600;
      padding: 3px 10px;
      border-radius: var(--radius-full);
    }
    .s7-horizon-90j {
      background: rgba(231,70,1,0.12);
      color: var(--orange);
    }
    .s7-horizon-6m {
      background: rgba(137,98,253,0.12);
      color: var(--violet);
    }
    .s7-horizon-12m {
      background: rgba(206,8,169,0.12);
      color: var(--magenta);
    }

    .s7-priority-table tbody tr[data-priority="primary"] td:first-child {
      border-left: 3px solid var(--orange);
      padding-left: 13px;
    }
    .s7-priority-table tbody tr[data-priority="secondary"] td:first-child {
      border-left: 3px solid var(--magenta);
      padding-left: 13px;
    }
    .s7-priority-table tbody tr[data-priority="deferred"] {
      opacity: 0.5;
    }


    /* ============================================================
       STRUCTURE DE PAGE — footer, responsive, print
       Footer | @media (max-width: 900px) | @media print
       ============================================================ */

    .footer { display: none; }

    /* Progress dots — fixed bottom center */
    .progress-dots { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 90; display: flex; gap: 8px; background: rgba(26,26,26,0.8); backdrop-filter: blur(10px); padding: 8px 16px; border-radius: var(--radius-full); border: 1px solid var(--border); }
    .progress-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-30); cursor: pointer; transition: all 0.3s; }
    .progress-dot.active { background: var(--orange); transform: scale(1.3); }

    /* Print button — fixed bottom left */
    .print-btn { position: fixed; bottom: 32px; left: 32px; z-index: 99; width: 48px; height: 48px; border-radius: 50%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.5); cursor: pointer; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px); transition: all 0.3s ease; }
    .print-btn:hover { background: rgba(255,255,255,0.12); color: var(--text); border-color: var(--border-hover); }

    /* ============================================================
       RESPONSIVE
       ============================================================ */
    @media (max-width: 900px) {
      .grid-4, .grid-3, .timeline, .qw-grid, .pricing-grid, .sim-results, .routine-grid { grid-template-columns: 1fr; }
      .grid-2, .context-grid { grid-template-columns: 1fr; }
      .bar-row { grid-template-columns: 120px 1fr 60px; }
      .sim-row { grid-template-columns: 1fr; gap: 8px; }
      .nav-inner { overflow-x: auto; }
      .context-card { flex-direction: column; gap: 12px; }
      .vs-grid { grid-template-columns: 1fr; }
      .vs-separator { padding: 12px 0; }
      .before-after { grid-template-columns: 1fr; }
      .ba-arrow { padding: 12px 0; transform: rotate(90deg); }
      .funnel { flex-direction: column; }
      .funnel-arrow { width: auto; height: 32px; transform: rotate(90deg); }
      .stat-row { flex-direction: column; gap: 16px; padding: 24px; }
      .stat-row-item + .stat-row-item::before { display: none; }
      .donut-grid { grid-template-columns: repeat(2, 1fr); }
      .kpi-mini-grid { grid-template-columns: 1fr; }
      .testimonial-grid { grid-template-columns: 1fr; }
      .s7-grid { grid-template-columns: 1fr; }
      .s7-insight { padding: 20px 20px 20px 24px; }
      .s7-priority-table { font-size: 13px; }
      .s7-priority-table thead th,
      .s7-priority-table tbody td { padding: 10px 12px; }
      .scroll-table-mobile { overflow-x: auto !important; -webkit-overflow-scrolling: touch; }
      .scroll-table-mobile > div { min-width: 600px; }
      .slide--scrollable { overflow-y: auto; }
    }

    /* ============================================================
       PRINT — @media print
       Affichage A4, masquage nav/CTA, break-inside:avoid
       ============================================================ */
    @media print {
      body { background: var(--bg) !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; height: auto; overflow: auto; }
      .nav { display: none; }
      .main { height: auto; margin-top: 0; overflow: auto; }
      .tab-content { display: block !important; height: auto; overflow: visible; scroll-snap-type: none; }
      .slide { min-height: auto; page-break-inside: avoid; }
      .hero, .hero-short { min-height: auto; page-break-inside: avoid; }
      .section { page-break-inside: avoid; }
      .accordion-content { max-height: none !important; }
      .s7-grid { grid-template-columns: repeat(3, 1fr); }
      .s7-card { break-inside: avoid; }
      .s7-card[data-state="deferred"] { opacity: 0.5; }
      .s7-insight { break-inside: avoid; }
      .s7-priority-table { break-inside: avoid; }

      /* Board-ready A4 — resume decisionnel + radar + pricing sur 1 page */
      .highlight-gradient { break-inside: avoid; }
      .pricing-grid { break-inside: avoid; }
      .timeline { break-inside: avoid; }
      .cta-section { display: none; } /* masquer les CTA en print */
      button[onclick="window.print()"] { display: none; } /* masquer le bouton print en print */
      .scroll-arrow { display: none !important; }
      .progress-dots { display: none !important; }
      .print-btn { display: none !important; }
    }

    /* ============================================================
       SCROLL ARROW — navigation slide-to-slide
       Bouton fixe bas-droite, scroll vers la slide suivante.
       ============================================================ */
    .scroll-arrow {
      position: fixed;
      bottom: 32px;
      right: 32px;
      z-index: 99;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      color: var(--text-50);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .scroll-arrow:hover {
      background: rgba(255,255,255,0.12);
      color: var(--text);
      border-color: var(--border-hover);
      transform: translateY(-2px);
    }
    .scroll-arrow.hidden {
      opacity: 0;
      pointer-events: none;
      transform: translateY(10px);
    }
    .scroll-arrow svg {
      width: 20px;
      height: 20px;
      animation: arrow-bounce 2s ease-in-out infinite;
    }
    @keyframes arrow-bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(4px); }
    }
    @media (max-height: 820px) {
      .scroll-arrow { bottom: 16px; right: 16px; width: 40px; height: 40px; }
    }
  </style>
</head>

<script>
// Tab switching
  document.querySelectorAll('.nav-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      tab.classList.add('active');
      const target = document.getElementById('tab-' + tab.dataset.tab);
      target.classList.add('active');
      target.scrollTop = 0;
      updateDots();
    });
  });

  // Bar chart + Progress bar animation on scroll
  const animObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        // Bar charts
        entry.target.querySelectorAll('.bar-fill').forEach(bar => {
          bar.style.width = bar.dataset.width + '%';
        });
        // Progress bars
        entry.target.querySelectorAll('.progress-fill').forEach(bar => {
          bar.style.width = bar.dataset.width + '%';
        });
      }
    });
  }, { threshold: 0.3 });

  document.querySelectorAll('.chart-container, .progress-group').forEach(c => animObserver.observe(c));

  // Number ticker animation
  const tickerObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const el = entry.target;
        const target = parseInt(el.dataset.target);
        if (isNaN(target) || el.dataset.animated) return;
        el.dataset.animated = 'true';
        const duration = 1500;
        const start = performance.now();
        const fmt = n => n.toLocaleString('fr-FR');

        function tick(now) {
          const elapsed = now - start;
          const progress = Math.min(elapsed / duration, 1);
          // Ease out cubic
          const eased = 1 - Math.pow(1 - progress, 3);
          el.textContent = fmt(Math.round(target * eased));
          if (progress < 1) requestAnimationFrame(tick);
        }
        requestAnimationFrame(tick);
      }
    });
  }, { threshold: 0.5 });

  document.querySelectorAll('.ticker-value').forEach(t => tickerObserver.observe(t));

  // Accordion
  document.querySelectorAll('.accordion-trigger').forEach(trigger => {
    trigger.addEventListener('click', () => {
      const item = trigger.closest('.accordion-item');
      const wasOpen = item.classList.contains('open');

      // Close all in same accordion
      item.closest('.accordion').querySelectorAll('.accordion-item').forEach(i => {
        i.classList.remove('open');
      });

      // Toggle current
      if (!wasOpen) item.classList.add('open');
    });
  });

  // ROI Simulator
  const fmt = n => n.toLocaleString('fr-FR');

  function updateSim() {
    const traffic = +document.getElementById('sim-traffic').value;
    const gainEl = document.getElementById('sim-gain');
    const multiEl = document.getElementById('sim-multi');
    const cvr = +document.getElementById('sim-cvr').value;
    const aov = +document.getElementById('sim-aov').value;
    const invest = +document.getElementById('sim-invest').value;

    document.getElementById('val-traffic').textContent = fmt(traffic);
    document.getElementById('val-cvr').textContent = cvr.toFixed(1) + '%';
    document.getElementById('val-aov').textContent = fmt(aov) + ' €';
    document.getElementById('val-invest').textContent = fmt(invest) + ' €';

    let targetTraffic, gain;
    if (gainEl) {
      gain = +gainEl.value;
      document.getElementById('val-gain').textContent = '+' + fmt(gain);
      targetTraffic = traffic + gain;
    } else if (multiEl) {
      const multi = +multiEl.value;
      document.getElementById('val-multi').textContent = '×' + multi.toFixed(1);
      gain = Math.round(traffic * multi) - traffic;
      targetTraffic = traffic + gain;
    } else {
      gain = 0;
      targetTraffic = traffic;
    }

    const additionalCA = Math.round(gain * (cvr / 100) * aov * 12);
    const totalInvest = 7700 + invest * 9;
    const roi = totalInvest > 0 ? (additionalCA / totalInvest) : 0;

    document.getElementById('res-traffic').textContent = fmt(targetTraffic);
    document.getElementById('res-ca').textContent = fmt(additionalCA) + ' €';
    document.getElementById('res-roi').textContent = '×' + roi.toFixed(1);
  }

  document.querySelectorAll('.sim-slider').forEach(s => {
    s.addEventListener('input', updateSim);
  });

  updateSim();

  // Scroll arrow — slide-to-slide navigation
  (function() {
    const arrow = document.getElementById('scroll-arrow');
    if (!arrow) return;

    function getSnapTargets() {
      const activeTab = document.querySelector('.tab-content.active');
      if (!activeTab) return [];
      return Array.from(activeTab.querySelectorAll('.slide, .hero, .cta-section, .slide-full'));
    }

    function getScrollContainer() {
      return document.querySelector('.tab-content.active');
    }

    function getCurrentIndex(targets, container) {
      if (!container) return 0;
      const scrollTop = container.scrollTop;
      const viewHeight = container.clientHeight;
      for (let i = targets.length - 1; i >= 0; i--) {
        if (targets[i].offsetTop - container.offsetTop <= scrollTop + viewHeight * 0.4) {
          return i;
        }
      }
      return 0;
    }

    arrow.addEventListener('click', function() {
      var targets = getSnapTargets();
      var container = getScrollContainer();
      if (targets.length === 0 || !container) return;
      var current = getCurrentIndex(targets, container);
      var next = Math.min(current + 1, targets.length - 1);
      targets[next].scrollIntoView({ behavior: 'smooth', block: 'start' });
    });

    function checkVisibility() {
      var targets = getSnapTargets();
      var container = getScrollContainer();
      if (targets.length === 0 || !container) { arrow.classList.add('hidden'); return; }
      var current = getCurrentIndex(targets, container);
      arrow.classList.toggle('hidden', current >= targets.length - 1);
    }

    // Listen on all tab-content scroll containers
    document.querySelectorAll('.tab-content').forEach(function(tc) {
      tc.addEventListener('scroll', checkVisibility, { passive: true });
    });

    document.querySelectorAll('.nav-tab').forEach(function(tab) {
      tab.addEventListener('click', function() { setTimeout(checkVisibility, 100); });
    });

    checkVisibility();
  })();

  // Progress dots
  function updateDots() {
    const dc = document.getElementById('progress-dots');
    if (!dc) return;
    dc.innerHTML = '';
    const at = document.querySelector('.tab-content.active');
    if (!at) return;
    const slides = at.querySelectorAll('.slide, .hero, .cta-section, .slide-full');
    slides.forEach((s, i) => {
      const dot = document.createElement('span');
      dot.className = 'progress-dot';
      dot.addEventListener('click', () => { s.scrollIntoView({ behavior: 'smooth' }); });
      dc.appendChild(dot);
    });
    if (slides.length > 0) dc.querySelectorAll('.progress-dot')[0].classList.add('active');
    if (window._dotObs) window._dotObs.disconnect();
    window._dotObs = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const idx = Array.from(slides).indexOf(entry.target);
          dc.querySelectorAll('.progress-dot').forEach((d, i) => { d.classList.toggle('active', i === idx); });
        }
      });
    }, { threshold: 0.5 });
    slides.forEach(s => window._dotObs.observe(s));
  }
  updateDots();
